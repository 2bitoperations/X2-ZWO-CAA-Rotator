name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: libx2caarotator.so

          - os: macos-latest
            platform: macos
            artifact: libx2caarotator.dylib

          - os: windows-latest
            platform: windows
            artifact: libx2caarotator.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build number
        id: ver
        shell: bash
        run: echo "n=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      # ---- Linux / macOS ----
      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: make BUILD_NUMBER=${{ steps.ver.outputs.n }}

      # ---- Windows: MSYS2 + MinGW64 ----
      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make BUILD_NUMBER=${{ steps.ver.outputs.n }}

      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp "${{ matrix.artifact }}" dist/
          cp x2caarotator.ui dist/
          cp "rotatorlist ZWO CAA.txt" dist/
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp install.ps1 dist/
          else
            cp install.sh dist/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x2caarotator-${{ matrix.platform }}
          path: dist/

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version tag
        id: ver
        run: |
          N=$(git rev-list --count HEAD)
          echo "tag=v1.${N}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip platform bundles
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: artifacts/*.zip
          generate_release_notes: true
