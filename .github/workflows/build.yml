name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: libx2caarotator.so

          - os: macos-latest
            platform: macos
            artifact: libx2caarotator.dylib

          - os: windows-latest
            platform: windows
            artifact: libx2caarotator.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build number
        id: ver
        shell: bash
        run: echo "n=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install hidapi (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libhidapi-dev

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: make BUILD_NUMBER=${{ steps.ver.outputs.n }}

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Install hidapi (macOS)
        if: runner.os == 'macOS'
        run: brew install hidapi

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: make BUILD_NUMBER=${{ steps.ver.outputs.n }}

      # ── Windows (pre-installed MSYS2 / MinGW64) ───────────────────────────
      # The windows-latest runner ships MSYS2 at C:\msys64 — use it directly
      # rather than the setup-msys2 action (which tries to download a new copy).
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: 'C:\msys64\usr\bin\bash.exe -l {0}'
        env:
          MSYSTEM: MINGW64
        run: pacman -Sy --noconfirm --needed mingw-w64-x86_64-gcc mingw-w64-x86_64-hidapi make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: 'C:\msys64\usr\bin\bash.exe -l {0}'
        env:
          MSYSTEM: MINGW64
        run: |
          cd "$(cygpath "$GITHUB_WORKSPACE")"
          make BUILD_NUMBER=${{ steps.ver.outputs.n }}

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir dist
          cp "${{ matrix.artifact }}" dist/
          cp x2caarotator.ui dist/
          cp "rotatorlist ZWO CAA.txt" dist/
          cp 99-zwocaa.rules dist/
          cp install.sh dist/
          chmod +x dist/install.sh

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: 'C:\msys64\usr\bin\bash.exe -l {0}'
        env:
          MSYSTEM: MINGW64
        run: |
          cd "$(cygpath "$GITHUB_WORKSPACE")"
          mkdir dist
          cp "${{ matrix.artifact }}" dist/
          cp x2caarotator.ui dist/
          cp "rotatorlist ZWO CAA.txt" dist/
          cp install.ps1 dist/
          # Bundle hidapi.dll from the MSYS2 MinGW64 runtime so the install
          # is self-contained — install.ps1 will copy it next to the plugin.
          HIDAPI_DLL="$(cygpath -u 'C:/msys64/mingw64/bin')/hidapi.dll"
          if [[ -f "${HIDAPI_DLL}" ]]; then
            cp "${HIDAPI_DLL}" dist/
            echo "Bundled ${HIDAPI_DLL}"
          else
            echo "WARNING: hidapi.dll not found at ${HIDAPI_DLL}" >&2
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x2caarotator-${{ matrix.platform }}
          path: dist/

  # ── Auto-release on push to main ────────────────────────────────────────────
  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version tag
        id: ver
        run: |
          N=$(git rev-list --count HEAD)
          echo "tag=v1.${N}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip platform bundles
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: artifacts/*.zip
          generate_release_notes: true
